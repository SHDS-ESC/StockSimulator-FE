<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <!-- 전체 화면 배경 -->
  <rect width="100%" height="100%" fill="url(#fullScreenBg)"/>
  
  <!-- 메인 로고 영역 (상단) -->
  <g transform="translate(50, 20)">
    
    <!-- 중앙 F 아이콘 -->
    <g transform="translate(-10, -8)">
      <path d="M0,0 L0,12 M0,0 L10,0 M0,6 L8,6" 
            stroke="white" 
            stroke-width="1.5" 
            stroke-linecap="round" 
            stroke-linejoin="round" 
            fill="none"/>
    </g>
    
    <!-- 금융 차트 요소들 -->
    <g transform="translate(2, -8)">
      <!-- 상승 트렌드 바들 -->
      <rect x="0" y="7" width="1" height="5" fill="white" opacity="0.8" rx="0.5"/>
      <rect x="2" y="5" width="1" height="7" fill="white" opacity="0.9" rx="0.5"/>
      <rect x="4" y="3" width="1" height="9" fill="white" opacity="1" rx="0.5"/>
      <rect x="6" y="2" width="1" height="10" fill="white" opacity="0.9" rx="0.5"/>
      
      <!-- 연결 곡선 -->
      <path d="M0.5,9 Q2,7 4.5,7 Q6.5,4 6.5,7" 
            stroke="white" 
            stroke-width="0.5" 
            fill="none" 
            opacity="0.6"/>
    </g>
    
    <!-- FINT 메인 텍스트 -->
    <text x="0" y="12" 
          font-family="'SF Pro Display', system-ui, sans-serif" 
          font-size="8" 
          font-weight="800" 
          fill="white" 
          text-anchor="middle" 
          letter-spacing="1px">FINT</text>
          
    <!-- 서브 텍스트 -->
    <text x="0" y="18" 
          font-family="'SF Pro Text', system-ui, sans-serif" 
          font-size="3" 
          font-weight="500" 
          fill="white" 
          text-anchor="middle" 
          letter-spacing="0.5px">FINANCE HINT</text>
  </g>
  
  <!-- 그라디언트 정의 -->
 \
</svg>